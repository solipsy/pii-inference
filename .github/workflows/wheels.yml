name: Wheels

# Tests run on every push/PR. Wheels are built on tag pushes (v*) and on manual
# dispatch, then attached to a GitHub Release on tags.
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Build extension and run tests
        run: |
          uv sync
          uv run pytest -q

  wheels:
    name: Wheels (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest   # Linux x86_64 (manylinux)
          - os: macos-14        # Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  release:
    name: Attach wheels to release
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.whl \
            --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/*.whl --repo "$GITHUB_REPOSITORY" --clobber

  publish:
    name: Publish to PyPI
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): no API token needed. Configure a PyPI trusted
    # publisher for this repo + workflow + the "pypi" environment (see PUBLISHING.md).
    environment:
      name: pypi
      url: https://pypi.org/p/pii-inference
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
